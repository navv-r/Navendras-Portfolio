name: Update GitHub Stats

on:
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch total commit count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.cloak-preview+json" \
            "https://api.github.com/search/commits?q=author:navv-r&per_page=1" \
            | jq '.total_count')
          echo "{\"commits\": $TOTAL}" > public/stats.json
          echo "Commit count: $TOTAL"

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats.json
          git diff --staged --quiet || git commit -m "chore: update commit stats [skip ci]"
          git push
